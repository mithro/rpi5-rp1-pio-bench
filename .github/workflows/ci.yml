name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-x86:
    name: Test (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test binary
        working-directory: throughput-pioloop-piolib
        run: make test

      - name: Run tests
        working-directory: throughput-pioloop-piolib
        run: make run-test

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: test_stats-x86_64
          path: throughput-pioloop-piolib/test_stats

  test-arm:
    name: Test (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build test binary
        working-directory: throughput-pioloop-piolib
        run: make test

      - name: Run tests
        working-directory: throughput-pioloop-piolib
        run: make run-test

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: test_stats-aarch64
          path: throughput-pioloop-piolib/test_stats

  build-benchmarks:
    name: Build benchmarks (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Add Raspberry Pi apt repository
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://archive.raspberrypi.com/debian/raspberrypi.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/raspberrypi-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/raspberrypi-archive-keyring.gpg] https://archive.raspberrypi.com/debian/ bookworm main" | sudo tee /etc/apt/sources.list.d/raspberrypi.list
          sudo apt-get update

      - name: Install libpio-dev and RPi kernel headers
        run: sudo apt-get install -y libpio-dev linux-libc-dev

      - name: Build throughput-pioloop-piolib
        working-directory: throughput-pioloop-piolib
        run: make FORCE_BUILD=1

      - name: Build throughput-pioloop-cyclic
        working-directory: throughput-pioloop-cyclic
        run: make FORCE_BUILD=1

      - name: Build throughput-gpioloop-piolib
        working-directory: throughput-gpioloop-piolib
        run: make FORCE_BUILD=1

      - name: Build latency-gpioloop (RPi5)
        working-directory: latency-gpioloop
        run: make FORCE_BUILD=1

      - name: Build latency-gpioloop (RPi4)
        working-directory: latency-gpioloop
        run: make rpi4 FORCE_BUILD=1

      - name: Build frequency-gpiotoggle (RPi5)
        working-directory: frequency-gpiotoggle
        run: make FORCE_BUILD=1

      - name: Build throughput-pioloop-m3poll host tools
        working-directory: throughput-pioloop-m3poll
        run: make core1_launcher throughput_pioloop_m3poll

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-aarch64
          path: |
            throughput-pioloop-piolib/throughput_pioloop_piolib
            throughput-pioloop-cyclic/throughput_pioloop_cyclic
            throughput-gpioloop-piolib/throughput_gpioloop_piolib
            latency-gpioloop/latency_gpioloop
            latency-gpioloop/latency_gpioloop_rpi4
            frequency-gpiotoggle/frequency_gpiotoggle
            throughput-pioloop-m3poll/core1_launcher
            throughput-pioloop-m3poll/throughput_pioloop_m3poll

  build-m3-firmware:
    name: Build M3 Core 1 firmware
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM cross-compiler
        run: sudo apt-get install -y gcc-arm-none-eabi

      - name: Build M3 firmware binaries
        working-directory: throughput-pioloop-m3poll
        run: make firmware

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: m3-firmware-aarch64
          path: throughput-pioloop-m3poll/*.bin
