name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-x86:
    name: Test (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test binary
        working-directory: throughput-piolib
        run: make test

      - name: Run tests
        working-directory: throughput-piolib
        run: make run-test

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_test-x86_64
          path: throughput-piolib/benchmark_test

  test-arm:
    name: Test (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build test binary
        working-directory: throughput-piolib
        run: make test

      - name: Run tests
        working-directory: throughput-piolib
        run: make run-test

      - name: Upload test binary
        uses: actions/upload-artifact@v4
        with:
          name: benchmark_test-aarch64
          path: throughput-piolib/benchmark_test

  build-benchmarks:
    name: Build benchmarks (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Add Raspberry Pi apt repository
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://archive.raspberrypi.com/debian/raspberrypi.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/raspberrypi-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/raspberrypi-archive-keyring.gpg] https://archive.raspberrypi.com/debian/ bookworm main" | sudo tee /etc/apt/sources.list.d/raspberrypi.list
          sudo apt-get update

      - name: Install libpio-dev
        run: sudo apt-get install -y libpio-dev

      - name: Build throughput-piolib
        working-directory: throughput-piolib
        run: make benchmark FORCE_BUILD=1

      - name: Build throughput-cyclic-dma
        working-directory: throughput-cyclic-dma
        run: make sram_dma_bench FORCE_BUILD=1

      - name: Build throughput-gpio-loopback
        working-directory: throughput-gpio-loopback
        run: make FORCE_BUILD=1

      - name: Build latency-gpio (RPi5)
        working-directory: latency-gpio
        run: make rpi5 FORCE_BUILD=1

      - name: Build latency-gpio (RPi4)
        working-directory: latency-gpio
        run: make rpi4 FORCE_BUILD=1

      - name: Build toggle-frequency (RPi5)
        working-directory: toggle-frequency
        run: make rpi5 FORCE_BUILD=1

      - name: Build throughput-m3-core1 host tools
        working-directory: throughput-m3-core1
        run: |
          gcc -Wall -Wextra -Werror -O2 -std=c11 -o core1_launcher core1_launcher.c -lm
          gcc -Wall -Wextra -Werror -O2 -std=c11 -I/usr/include/piolib -o m3_bridge_bench m3_bridge_bench.c -lm -lpio

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-aarch64
          path: |
            throughput-piolib/pio_loopback
            throughput-cyclic-dma/sram_dma_bench
            throughput-gpio-loopback/gpio_loopback
            latency-gpio/latency_rpi5
            latency-gpio/latency_rpi4
            toggle-frequency/toggle_rpi5
            throughput-m3-core1/core1_launcher
            throughput-m3-core1/m3_bridge_bench

  build-m3-firmware:
    name: Build M3 Core 1 firmware
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM cross-compiler
        run: sudo apt-get install -y gcc-arm-none-eabi

      - name: Build M3 firmware binaries
        working-directory: throughput-m3-core1
        run: make firmware

      - name: Upload firmware binaries
        uses: actions/upload-artifact@v4
        with:
          name: m3-firmware-aarch64
          path: throughput-m3-core1/*.bin
